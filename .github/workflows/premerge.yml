name: Premerge

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

env:
  CMAKE_PRESET: release
  LLVM_VERSION: "20.1.0"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install LLVM & MLIR
      uses: vovkos/get-llvm-action@v1
      with:
        version: ${{ env.LLVM_VERSION }}
        components: "clang;lld;mlir"

    - name: Install wllvm
      run: pip install wllvm==1.3.1

    - name: Run Pre-commit
      uses: pre-commit/action@v3.0.1

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        create-symlink: true
        max-size: "500M"
        key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-ccache-


    - name: Configure CMake
      run: |
        cmake --preset ${{env.CMAKE_PRESET}} \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build --preset ${{env.CMAKE_PRESET}}

    - name: Test
      run: |
        ctest --preset ${{env.CMAKE_PRESET}} -E integration-tests
        ctest --preset ${{env.CMAKE_PRESET}} -R integration-tests -V